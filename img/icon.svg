<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Printer body -->
    <rect x="-80" y="-20" width="160" height="60" rx="8" fill="white" opacity="0.95"/>
    <!-- Paper slot -->
    <rect x="-50" y="-60" width="100" height="50" rx="4" fill="white" opacity="0.85"/>
    <!-- Paper coming out -->
    <rect x="-40" y="40" width="80" height="35" rx="4" fill="white" opacity="0.7"/>
    <!-- Print lines on paper -->
    <line x1="-25" y1="52" x2="25" y2="52" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="60" x2="15" y2="60" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="-25" y1="68" x2="20" y2="68" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <!-- Status light -->
    <circle cx="55" cy="5" r="5" fill="#10b981"/>
  </g>
</svg>
